name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-windows.yml"
      - "README.md"
      - "presenter/**"
      - "samples/**"
      - "tests/**"

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows zip
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Run tests
        run: |
          python -m unittest discover -s tests
          python -m compileall presenter tests

      - name: Build Windows app
        shell: cmd
        run: presenter\build_windows.bat

      - name: Create Windows zip
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "dist\MCA Question Presenter" `
            -DestinationPath "dist\MCA Question Presenter Windows.zip" `
            -Force

      - name: Upload Windows zip
        uses: actions/upload-artifact@v4
        with:
          name: MCA-Question-Presenter-Windows
          path: "dist/MCA Question Presenter Windows.zip"
          if-no-files-found: error
